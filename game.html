<script>

const heart = document.getElementById("heart");
const gameArea = document.getElementById("gameArea");
const scoreText = document.getElementById("score");

let score = 0;


// RANDOM HEART MOVEMENT

function moveHeart(){

  const areaWidth = gameArea.clientWidth - 80;
  const areaHeight = gameArea.clientHeight - 80;

  const randomX = Math.random() * areaWidth;
  const randomY = Math.random() * areaHeight;

  const randomSize = Math.random() * 25 + 35;

  const randomRotate = Math.random() * 360;

  heart.style.transition =
    `all ${Math.random() * 0.18 + 0.12}s linear`;

  heart.style.left = randomX + "px";

  heart.style.top = randomY + "px";

  heart.style.fontSize = randomSize + "px";

  heart.style.transform = `rotate(${randomRotate}deg)`;
}


// CLICK EVENT

heart.addEventListener("click", () => {

  score++;

  scoreText.innerText = score;

  heart.style.transform += " scale(1.25)";

  setTimeout(() => {

    moveHeart();

  },60);

});


// FAST RANDOM MOVEMENT

setInterval(() => {

  moveHeart();

},350);

moveHeart();


// FLOATING BACKGROUND HEARTS

const bg = document.getElementById("bg");

for(let i=0;i<30;i++){

  const h = document.createElement("div");

  h.classList.add("floating-heart");

  h.innerHTML = "❤️";

  h.style.left = Math.random()*100 + "vw";

  h.style.fontSize =
    (Math.random()*20 + 14) + "px";

  h.style.animationDuration =
    (Math.random()*8 + 6) + "s";

  h.style.opacity = Math.random();

  bg.appendChild(h);
}

</script>
